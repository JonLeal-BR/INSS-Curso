<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>INSS Master PRO</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
}

button {
  padding: 15px;
  margin: 10px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

.menu button { background: #1e293b; color: white; }
.certo { background: green; }
.errado { background: red; }

.hidden { display: none; }

#feedback {
  margin-top: 15px;
  font-size: 14px;
}
</style>
</head>

<body>

<h1>📚 INSS MASTER PRO</h1>

<div id="menu" class="menu">
  <h2>Escolha a Matéria</h2>
  <button onclick="iniciar('portugues')">Português</button>
  <button onclick="iniciar('previdenciario')">Previdenciário</button>
  <button onclick="iniciar('informatica')">Informática</button>

  <h2>Simulado</h2>
  <button onclick="simulado(1)">🟢 Iniciante</button>
  <button onclick="simulado(2)">🟡 Intermediário</button>
  <button onclick="simulado(3)">🔴 Expert</button>
</div>

<div id="quiz" class="hidden">
  <h3 id="pergunta"></h3>

  <button class="certo" onclick="responder(true)">CERTO</button>
  <button class="errado" onclick="responder(false)">ERRADO</button>

  <p id="feedback"></p>
  <p id="placar"></p>

  <button onclick="voltar()">⬅ Voltar</button>
</div>

<script>

const banco = {

portugues: [
{q:"A substituição de 'há' por 'faz' mantém o sentido temporal.", r:true, c:"'Há' indica tempo decorrido e pode ser substituído por 'faz'."},
{q:"'Houveram problemas' está correto.", r:false, c:"O verbo 'haver' no sentido de existir é impessoal e fica no singular."},
{q:"Crase ocorre antes de palavras masculinas.", r:false, c:"Crase ocorre antes de palavras femininas que admitem artigo 'a'."},
{q:"Sujeito pode ser oculto.", r:true, c:"O sujeito oculto é identificado pela desinência verbal."},
{q:"Pontuação não altera sentido.", r:false, c:"Pontuação pode mudar completamente o sentido da frase."},
{q:"Concordância verbal depende do núcleo do sujeito.", r:true, c:"A regra central da concordância verbal é essa."}
],

previdenciario: [
{q:"A previdência social exige contribuição.", r:true, c:"A previdência é contributiva e obrigatória para segurados."},
{q:"Assistência social exige contribuição prévia.", r:false, c:"Assistência é não contributiva."},
{q:"Saúde é parte da seguridade social.", r:true, c:"Seguridade é composta por saúde, assistência e previdência."},
{q:"Segurado facultativo exerce atividade remunerada.", r:false, c:"Facultativo não exerce atividade remunerada."},
{q:"A seguridade é financiada apenas pelo governo.", r:false, c:"Toda a sociedade financia a seguridade."},
{q:"Empregado é segurado obrigatório.", r:true, c:"Empregado entra automaticamente como segurado."}
],

informatica: [
{q:"RAM é volátil.", r:true, c:"Perde dados ao desligar."},
{q:"SSD é mais lento que HD.", r:false, c:"SSD é mais rápido que HD."},
{q:"Sistema operacional gerencia hardware.", r:true, c:"Essa é sua função principal."},
{q:"CPU executa instruções.", r:true, c:"CPU é o cérebro do computador."},
{q:"Backup é desnecessário.", r:false, c:"Backup é essencial para segurança de dados."},
{q:"Vírus pode danificar arquivos.", r:true, c:"Malwares podem comprometer o sistema."}
]

};

let lista = [];
let atual;
let acertos = 0;
let erros = 0;

function iniciar(materia){
  lista = banco[materia];
  start();
}

function simulado(nivel){
  lista = [];
  Object.values(banco).forEach(m => lista = lista.concat(m));

  if(nivel === 2) lista = lista.concat(lista);
  if(nivel === 3) lista = lista.concat(lista, lista);

  start();
}

function start(){
  document.getElementById("menu").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");

  acertos = 0;
  erros = 0;

  nova();
}

function nova(){
  atual = lista[Math.floor(Math.random()*lista.length)];
  document.getElementById("pergunta").innerText = atual.q;
  document.getElementById("feedback").innerText = "";
}

function responder(resp){
  if(resp === atual.r){
    acertos++;
    document.getElementById("feedback").innerText = "✅ Acertou";
  } else {
    erros++;
    document.getElementById("feedback").innerText =
      "❌ Errou → " + atual.c;
  }

  atualizar();

  setTimeout(nova, 2000);
}

function atualizar(){
  document.getElementById("placar").innerText =
    `Acertos: ${acertos} | Erros: ${erros}`;
}

function voltar(){
  document.getElementById("menu").classList.remove("hidden");
  document.getElementById("quiz").classList.add("hidden");
}

</script>

</body>
</html>
