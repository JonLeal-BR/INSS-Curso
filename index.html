<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>INSS Master App</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
}

button {
  padding: 14px;
  margin: 8px;
  border-radius: 10px;
  border: none;
  font-size: 15px;
}

.menu button { background: #1e293b; color: white; }
.certo { background: green; }
.errado { background: red; }

.hidden { display: none; }

#feedback {
  margin-top: 15px;
  font-size: 14px;
}
</style>
</head>

<body>

<h1>📚 INSS MASTER</h1>

<div id="menu" class="menu">
  <h2>Escolha a Matéria</h2>
  <button onclick="iniciar('portugues')">Português</button>
  <button onclick="iniciar('previdenciario')">Previdenciário</button>
  <button onclick="iniciar('informatica')">Informática</button>

  <h2>Simulado Geral</h2>
  <button onclick="simulado()">🎯 Iniciar Simulado</button>
</div>

<div id="quiz" class="hidden">
  <h3 id="pergunta"></h3>

  <button class="certo" onclick="responder(true)">CERTO</button>
  <button class="errado" onclick="responder(false)">ERRADO</button>

  <p id="feedback"></p>
  <p id="placar"></p>

  <button onclick="voltar()">⬅ Voltar</button>
</div>

<script>

// ================= BANCO DE QUESTÕES =================

const banco = {

portugues: [
{q:"O uso de 'há' pode indicar tempo decorrido.", r:true, c:"Correto. 'Há' indica tempo passado e pode ser substituído por 'faz'."},
{q:"A crase ocorre antes de palavras masculinas.", r:false, c:"Errado. A crase ocorre antes de palavras femininas que admitem artigo 'a'."},
{q:"O sujeito pode ser indeterminado.", r:true, c:"Correto. O sujeito indeterminado ocorre quando não se identifica o agente da ação."},
{q:"Pontuação não altera o sentido da frase.", r:false, c:"Errado. A pontuação pode alterar completamente o sentido."},
{q:"Verbo 'haver' no sentido de existir vai para o plural.", r:false, c:"Errado. Ele é impessoal e fica no singular."},
{q:"Predicado verbal indica ação.", r:true, c:"Correto. O núcleo é um verbo significativo."},
{q:"Adjunto adverbial é essencial.", r:false, c:"Errado. É termo acessório."},
{q:"Sujeito composto possui mais de um núcleo.", r:true, c:"Correto."},
{q:"Crase pode ocorrer antes de verbo.", r:false, c:"Errado. Nunca ocorre antes de verbo."},
{q:"Pronome substitui o nome.", r:true, c:"Correto."},
{q:"Advérbio modifica verbo.", r:true, c:"Correto."},
{q:"Interjeição possui função sintática.", r:false, c:"Errado. Não exerce função sintática."},
{q:"Regência verbal trata da relação entre verbo e complemento.", r:true, c:"Correto."},
{q:"Objeto direto exige preposição obrigatória.", r:false, c:"Errado."},
{q:"Concordância verbal depende do sujeito.", r:true, c:"Correto."},
{q:"Verbo de ligação indica estado.", r:true, c:"Correto."},
{q:"Artigo define o substantivo.", r:true, c:"Correto."},
{q:"Substantivo nomeia seres.", r:true, c:"Correto."},
{q:"Locução verbal tem apenas um verbo.", r:false, c:"Errado. Possui dois ou mais."},
{q:"Predicado nominal indica estado.", r:true, c:"Correto."}
],

previdenciario: [
{q:"A previdência social exige contribuição.", r:true, c:"Correto. É contributiva."},
{q:"Assistência social exige contribuição.", r:false, c:"Errado. É não contributiva."},
{q:"Saúde integra a seguridade social.", r:true, c:"Correto."},
{q:"Segurado facultativo exerce atividade remunerada.", r:false, c:"Errado."},
{q:"Empregado é segurado obrigatório.", r:true, c:"Correto."},
{q:"A seguridade é financiada por toda a sociedade.", r:true, c:"Correto."},
{q:"LOAS exige contribuição prévia.", r:false, c:"Errado."},
{q:"Aposentadoria é benefício previdenciário.", r:true, c:"Correto."},
{q:"Auxílio-doença é permanente.", r:false, c:"Errado."},
{q:"Salário-maternidade é benefício.", r:true, c:"Correto."},
{q:"Carência é número mínimo de contribuições.", r:true, c:"Correto."},
{q:"Dependentes não recebem benefícios.", r:false, c:"Errado."},
{q:"INSS paga benefícios.", r:true, c:"Correto."},
{q:"Segurado especial contribui mensalmente.", r:false, c:"Errado."},
{q:"Tempo de contribuição não importa.", r:false, c:"Errado."},
{q:"Reforma trouxe idade mínima.", r:true, c:"Correto."},
{q:"Contribuinte individual contribui obrigatoriamente.", r:true, c:"Correto."},
{q:"Pensão por morte é benefício.", r:true, c:"Correto."},
{q:"Seguridade é apenas previdência.", r:false, c:"Errado."},
{q:"INSS é autarquia federal.", r:true, c:"Correto."}
],

informatica: [
{q:"Memória RAM é volátil.", r:true, c:"Correto."},
{q:"SSD é mais lento que HD.", r:false, c:"Errado."},
{q:"CPU executa instruções.", r:true, c:"Correto."},
{q:"Sistema operacional gerencia hardware.", r:true, c:"Correto."},
{q:"Backup é desnecessário.", r:false, c:"Errado."},
{q:"Vírus pode danificar arquivos.", r:true, c:"Correto."},
{q:"Monitor é dispositivo de entrada.", r:false, c:"Errado."},
{q:"Teclado é dispositivo de entrada.", r:true, c:"Correto."},
{q:"Firewall protege sistema.", r:true, c:"Correto."},
{q:"Antivírus remove malware.", r:true, c:"Correto."},
{q:"Download envia arquivo.", r:false, c:"Errado."},
{q:"Upload envia arquivo.", r:true, c:"Correto."},
{q:"Internet é rede mundial.", r:true, c:"Correto."},
{q:"Linux é pago obrigatoriamente.", r:false, c:"Errado."},
{q:"Pen drive é armazenamento.", r:true, c:"Correto."},
{q:"HD é mais rápido que SSD.", r:false, c:"Errado."},
{q:"Nuvem é armazenamento remoto.", r:true, c:"Correto."},
{q:"Mouse é entrada.", r:true, c:"Correto."},
{q:"Arquivo não pode ser excluído.", r:false, c:"Errado."},
{q:"Sistema pode ter falhas.", r:true, c:"Correto."}
]

};

// ================= LÓGICA =================

let listaBase = [];
let listaAtual = [];
let atual;

let acertos = 0;
let erros = 0;

function iniciar(materia){
  listaBase = [...banco[materia]];
  preparar();
}

function simulado(){
  listaBase = [];
  Object.values(banco).forEach(m => listaBase = listaBase.concat(m));
  preparar();
}

function preparar(){
  document.getElementById("menu").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");

  acertos = 0;
  erros = 0;

  listaAtual = [...listaBase];
  embaralhar(listaAtual);

  nova();
}

function embaralhar(array){
  for(let i = array.length - 1; i > 0; i--){
    let j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function nova(){

  if(listaAtual.length === 0){
    listaAtual = [...listaBase];
    embaralhar(listaAtual);
  }

  atual = listaAtual.pop();

  document.getElementById("pergunta").innerText = atual.q;
  document.getElementById("feedback").innerText = "";
}

function responder(resp){
  if(resp === atual.r){
    acertos++;
    document.getElementById("feedback").innerText = "✅ Acertou";
  } else {
    erros++;
    document.getElementById("feedback").innerText =
      "❌ Errou → " + atual.c;
  }

  atualizar();
  setTimeout(nova, 2000);
}

function atualizar(){
  document.getElementById("placar").innerText =
    `Acertos: ${acertos} | Erros: ${erros}`;
}

function voltar(){
  document.getElementById("menu").classList.remove("hidden");
  document.getElementById("quiz").classList.add("hidden");
}

</script>

</body>
</html>
