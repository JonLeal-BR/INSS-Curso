<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>INSS Master PRO</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
}

button {
  padding: 15px;
  margin: 10px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

.menu button { background: #1e293b; color: white; }
.certo { background: green; }
.errado { background: red; }

.hidden { display: none; }

#feedback {
  margin-top: 15px;
  font-size: 14px;
}
</style>
</head>

<body>

<h1>📚 INSS MASTER PRO</h1>

<div id="menu" class="menu">
  <h2>Escolha a Matéria</h2>
  <button onclick="iniciar('portugues')">Português</button>
  <button onclick="iniciar('previdenciario')">Previdenciário</button>
  <button onclick="iniciar('informatica')">Informática</button>

  <h2>Simulado</h2>
  <button onclick="simulado()">🎯 Simular Prova</button>
</div>

<div id="quiz" class="hidden">
  <h3 id="pergunta"></h3>

  <button class="certo" onclick="responder(true)">CERTO</button>
  <button class="errado" onclick="responder(false)">ERRADO</button>

  <p id="feedback"></p>
  <p id="placar"></p>

  <button onclick="voltar()">⬅ Voltar</button>
</div>

<script>

const banco = {
  portugues: [...Array(20)].map((_,i)=>({
    q:`Português - Questão ${i+1}`,
    r: i%2===0,
    c:"Comentário explicativo da questão."
  })),

  previdenciario: [...Array(20)].map((_,i)=>({
    q:`Previdenciário - Questão ${i+1}`,
    r: i%2!==0,
    c:"Comentário explicativo da questão."
  })),

  informatica: [...Array(20)].map((_,i)=>({
    q:`Informática - Questão ${i+1}`,
    r: i%2===0,
    c:"Comentário explicativo da questão."
  }))
};

let lista = [];
let ordem = [];
let indice = 0;
let errosLista = [];

let atual;
let acertos = 0;
let erros = 0;

function embaralhar(array) {
  for (let i = array.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function iniciar(materia){
  lista = banco[materia];
  preparar();
}

function simulado(){
  lista = [];
  Object.values(banco).forEach(m => lista = lista.concat(m));
  preparar();
}

function preparar(){
  document.getElementById("menu").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");

  acertos = 0;
  erros = 0;
  errosLista = [];

  ordem = [...Array(lista.length).keys()];
  embaralhar(ordem);

  indice = 0;

  nova();
}

function nova(){

  if(indice >= ordem.length){
    // ciclo completo
    ordem = [...Array(lista.length).keys()];
    embaralhar(ordem);
    indice = 0;
  }

  atual = lista[ordem[indice]];
  indice++;

  document.getElementById("pergunta").innerText = atual.q;
  document.getElementById("feedback").innerText = "";
}

function responder(resp){
  if(resp === atual.r){
    acertos++;
    document.getElementById("feedback").innerText = "✅ Acertou";
  } else {
    erros++;
    errosLista.push(atual);

    document.getElementById("feedback").innerText =
      "❌ Errou → " + atual.c;
  }

  atualizar();

  setTimeout(nova, 2000);
}

function atualizar(){
  document.getElementById("placar").innerText =
    `Acertos: ${acertos} | Erros: ${erros}`;
}

function voltar(){
  document.getElementById("menu").classList.remove("hidden");
  document.getElementById("quiz").classList.add("hidden");
}

</script>

</body>
</html>
