  portugues,

  informatica
};

// ================= SISTEMA =================

let listaBase=[],listaAtual=[],atual;
let acertos=0,erros=0;

function abrirNivel(m){materiaAtual=m;menu.style.display="none";nivel.style.display="block";}
function iniciar(n){listaBase=[...banco[materiaAtual][n]];preparar();}
function simulado(){
listaBase=[];
Object.values(banco).forEach(m=>Object.values(m).forEach(n=>listaBase=listaBase.concat(n)));
preparar();
}

function preparar(){
nivel.style.display="none";quiz.style.display="block";
acertos=0;erros=0;
listaAtual=[...listaBase];
embaralhar(listaAtual);
nova();
}

function embaralhar(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

function nova(){
if(listaAtual.length===0){listaAtual=[...listaBase];embaralhar(listaAtual);}
atual=listaAtual.pop();
pergunta.innerText=atual.q;
feedback.innerText="";
}

function responder(r){
if(r===atual.r){
acertos++;feedback.innerText="✅ Acertou";atualizar();setTimeout(nova,2000);
}else{
erros++;feedback.innerText="❌ "+atual.c;atualizar();setTimeout(nova,15000);
}
}

function atualizar(){placar.innerText=`📊 ${acertos} acertos | ${erros} erros`;}
function voltarMenu(){menu.style.display="block";nivel.style.display="none";quiz.style.display="none";}
