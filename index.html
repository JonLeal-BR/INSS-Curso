<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>INSS Master App</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
}

button {
  padding: 15px;
  margin: 10px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

.menu button { background: #1e293b; color: white; }
.certo { background: green; }
.errado { background: red; }

.hidden { display: none; }

</style>
</head>

<body>

<h1>📚 INSS MASTER</h1>

<div id="menu" class="menu">
  <h2>Escolha a Matéria</h2>
  <button onclick="iniciar('portugues')">Português</button>
  <button onclick="iniciar('previdenciario')">Previdenciário</button>
  <button onclick="iniciar('informatica')">Informática</button>

  <h2>Simulado</h2>
  <button onclick="simulado(1)">🟢 Iniciante</button>
  <button onclick="simulado(2)">🟡 Intermediário</button>
  <button onclick="simulado(3)">🔴 Expert</button>
</div>

<div id="quiz" class="hidden">
  <h3 id="pergunta"></h3>

  <button class="certo" onclick="responder(true)">CERTO</button>
  <button class="errado" onclick="responder(false)">ERRADO</button>

  <p id="feedback"></p>
  <p id="placar"></p>

  <button onclick="voltar()">⬅ Voltar</button>
</div>

<script>

const banco = {
  portugues: [
    {q:"'Houveram problemas' está correto.", r:false},
    {q:"Crase ocorre antes de palavras femininas.", r:true},
    {q:"Sujeito simples pode ter mais de um núcleo.", r:false}
  ],

  previdenciario: [
    {q:"Previdência exige contribuição.", r:true},
    {q:"Assistência social é contributiva.", r:false},
    {q:"Segurado facultativo exerce atividade remunerada.", r:false}
  ],

  informatica: [
    {q:"RAM é memória volátil.", r:true},
    {q:"SSD é mais lento que HD.", r:false},
    {q:"Sistema operacional gerencia hardware.", r:true}
  ]
};

let lista = [];
let atual;
let acertos = 0;
let erros = 0;

function iniciar(materia){
  lista = banco[materia];
  start();
}

function simulado(nivel){
  lista = [];

  Object.values(banco).forEach(m => {
    lista = lista.concat(m);
  });

  if(nivel === 2) lista = lista.concat(lista);
  if(nivel === 3) lista = lista.concat(lista, lista);

  start();
}

function start(){
  document.getElementById("menu").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");

  acertos = 0;
  erros = 0;

  nova();
}

function nova(){
  atual = lista[Math.floor(Math.random()*lista.length)];
  document.getElementById("pergunta").innerText = atual.q;
  document.getElementById("feedback").innerText = "";
}

function responder(resp){
  if(resp === atual.r){
    acertos++;
    document.getElementById("feedback").innerText = "✅ Acertou";
  } else {
    erros++;
    document.getElementById("feedback").innerText = "❌ Errou";
  }

  atualizar();

  setTimeout(nova, 700);
}

function atualizar(){
  document.getElementById("placar").innerText =
    `Acertos: ${acertos} | Erros: ${erros}`;
}

function voltar(){
  document.getElementById("menu").classList.remove("hidden");
  document.getElementById("quiz").classList.add("hidden");
}

</script>

</body>
</html>
